<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비염 | 경희부연한의원</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* 🔥 전체 공통 스타일 */
body {
  font-family: 'Pretendard', sans-serif;
  line-height: 1.7; /* 가독성 핵심 */
}
</style>
</head>

<body class="bg-white text-gray-800">


<!-- =========================================================
1️⃣ HERO (공감 + 첫인상)
👉 가장 중요한 이미지 위치
========================================================= -->
<section class="bg-gray-50 py-20 text-center px-4">

  <!-- 🔥 핵심 메시지 -->
  <h1 class="text-3xl md:text-4xl font-semibold mb-4">
    환절기마다 반복되는 비염
  </h1>

  <p class="text-gray-600 mb-10">
    생활습관까지 함께 관리해야 합니다
  </p>

  <!-- 🔥 HERO 이미지 (직접 만든 이미지 넣는 자리)
  ✔ 파일명: rhinitis-hero.png
  ✔ 위치: public 폴더
  ✔ 사이즈: 가로형 (1600x900 추천)
  -->
  <img src="rhinitis-hero.png"
       class="mx-auto rounded-xl w-full max-w-3xl h-[320px] object-cover">

</section>


<!-- =========================================================
2️⃣ 증상 (카드형)
👉 텍스트를 읽기 쉽게 만드는 핵심 구간
========================================================= -->
<section class="py-16 px-4 max-w-4xl mx-auto">

  <h2 class="text-2xl font-semibold mb-6">이런 증상이 있나요?</h2>

  <!-- 🔥 카드 UI -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">

    <div class="bg-gray-100 p-4 rounded">재채기</div>
    <div class="bg-gray-100 p-4 rounded">콧물</div>
    <div class="bg-gray-100 p-4 rounded">코막힘</div>
    <div class="bg-gray-100 p-4 rounded">눈 가려움</div>

  </div>

</section>


<!-- =========================================================
3️⃣ 치료 필요성 강조
👉 “왜 치료해야 하는지” 설득 구간
========================================================= -->
<section class="bg-red-50 py-16 px-4 text-center">

  <h2 class="text-xl font-semibold mb-4">
    단순 감기가 아닙니다
  </h2>

  <p class="max-w-2xl mx-auto">
    비염을 방치하면 만성 호흡기 질환으로 발전할 수 있습니다.
  </p>

</section>


<!-- =========================================================
4️⃣ 치료 원리 (🔥 도표 자리)
👉 기존에 만든 도식 이미지 넣는 핵심 위치
========================================================= -->
<section class="py-16 px-4 max-w-4xl mx-auto text-center">

  <h2 class="text-2xl font-semibold mb-8">치료 원리</h2>

  <!-- 🔥 도표 이미지 자리
  ✔ 파일명: rhinitis-diagram.png
  ✔ 내용: 면역 / 환경 / 치료 흐름
  ✔ 사이즈: 세로형 or 정사각형
  -->
  <img src="rhinitis-diagram.png"
       class="mx-auto max-w-xl w-full">

</section>


</body>
</html>
