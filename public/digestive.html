<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소화불량 | 경희부연한의원</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Pretendard', sans-serif;
  line-height: 1.7;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="bg-gray-50 py-20 text-center">

<h1 class="text-3xl font-semibold mb-4">
난 소화는 잘 되는 편이야! 자신 있으신가요?
</h1>

<p class="text-gray-600">
방치하면 만성 질환으로 이어질 수 있습니다
</p>

</section>


<!-- 증상 -->
<section class="py-16 max-w-4xl mx-auto px-4">

<h2 class="text-2xl font-semibold mb-6">대표 증상</h2>

<ul class="space-y-2">
<li>식후 한참 뒤에도 위에 음식이 남아있는것 같다.</li>
<li>식사를 시작하면 금방 배가 불러 더 먹을수가 없다.</li>
<li>배가 빵빵하거나 더부룩한 느낌이 있다.</li>
<li>속이 미식거린다.</li>
<li>명치에 불편한 느낌이 있다.</li>
<li>속이 종종 쓰리다.</li>
<li>식사시간이 되어도 배가 고프지 않다.(먹긴 하지만 배가 고픈건 아니다)</li>
</ul>

</section>


<!-- 핵심 메시지 -->
<section class="bg-gray-100 py-16 text-center">

<p class="text-lg">
일시적인 완화가 아닌 위장 기능 회복이 중요합니다
</p>

</section>

</body>
</html>
