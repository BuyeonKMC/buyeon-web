<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통증 치료 | 경희부연한의원</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Pretendard', sans-serif;
  line-height: 1.7;
}
</style>
</head>

<body>

<!-- =========================
1️⃣ HERO
========================= -->
<section class="bg-gray-50 py-20 text-center px-4">

  <h1 class="text-3xl font-semibold mb-4">
    통증은 참는 것이 아닙니다
  </h1>

  <p class="text-gray-600 mb-10">
    방치할수록 회복은 더 늦어집니다
  </p>

</section>


<!-- =========================
2️⃣ 질환 카드
========================= -->
<section class="py-16 px-4 max-w-5xl mx-auto space-y-10">

  <!-- 디스크 -->
  <div class="flex flex-col md:flex-row gap-6">
    <img src="disc.jpg" class="w-full md:w-1/3 rounded">
    <div>
      <h3 class="text-xl font-semibold mb-2">허리디스크</h3>
      <p>허리 통증과 다리 저림이 나타나는 대표적인 질환입니다.</p>
    </div>
  </div>

  <!-- 오십견 -->
  <div class="flex flex-col md:flex-row gap-6">
    <img src="shoulder.jpg" class="w-full md:w-1/3 rounded">
    <div>
      <h3 class="text-xl font-semibold mb-2">오십견</h3>
      <p>어깨 움직임 제한과 통증이 특징입니다.</p>
    </div>
  </div>

  <!-- 안면마비 -->
  <div>
    <h3 class="text-xl font-semibold mb-2">안면마비</h3>
    <p>면역력 저하로 발생하는 신경 질환입니다.</p>
  </div>

</section>


<!-- =========================
3️⃣ 치료 방법
========================= -->
<section class="bg-gray-50 py-16 text-center">

  <h2 class="text-2xl font-semibold mb-8">치료 방법</h2>

  <div class="flex justify-center gap-10">

    <div>침 치료</div>
    <div>뜸 치료</div>
    <div>한약 치료</div>

  </div>

</section>

</body>
</html>
